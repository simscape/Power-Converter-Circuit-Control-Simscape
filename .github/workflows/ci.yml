name: CI using MATLAB

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.png'
      - '**.svg'
      - '**.txt'
      - '**.xml'

  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.png'
      - '**.svg'
      - '**.txt'
      - '**.xml'

# Every Monday at 03:00 UTC
  schedule:
    - cron: '0 3 * * 1'

jobs:
  Job-Check-Project:
    runs-on: ubuntu-latest
    steps:

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2025b
          cache: true
          products: |
            Simulink
            Simscape
            Simscape_Electrical
            Simulink_Control_Design
            Control_System_Toolbox
            Stateflow
            System_Identification_Toolbox

      - name: Run tests
        uses: matlab-actions/run-command@v2
        with:
          command: 'openProject(pwd); buildtool check:code;'

  Job-Grid-Forming-Converter-Tests:
    runs-on: ubuntu-latest
    steps:

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2025b
          cache: true
          products: |
            Simulink
            Simscape
            Simscape_Electrical
            Simulink_Control_Design
            Control_System_Toolbox
            Stateflow
            System_Identification_Toolbox

      - name: Run tests
        uses: matlab-actions/run-command@v2
        with:
          command: 'openProject(pwd); buildtool Test(''GFM'');'

  Job-LLC-Converter-Tests:
    runs-on: ubuntu-latest
    steps:

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2025b
          cache: true
          products: |
            Simulink
            Simscape
            Simscape_Electrical
            Simulink_Control_Design
            Control_System_Toolbox
            Stateflow
            System_Identification_Toolbox

      - name: Run tests
        uses: matlab-actions/run-command@v2
        with:
          command: 'openProject(pwd); buildtool Test(''LLC'');'